<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <!-- Sky -->
  <defs>
    <linearGradient id="sky" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#3d63e6"/>
      <stop offset="100%" stop-color="#3fb0ec"/>
    </linearGradient>
    <linearGradient id="sun" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#ffd15a"/>
      <stop offset="100%" stop-color="#ffb020"/>
    </linearGradient>
    <linearGradient id="waveBack" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#3f6fa8"/>
      <stop offset="100%" stop-color="#2b4d7f"/>
    </linearGradient>
    <linearGradient id="waveFront" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#2b4d7f"/>
      <stop offset="100%" stop-color="#1c3660"/>
    </linearGradient>
  </defs>

  <g>
    <!-- Sky background -->
    <rect x="0" y="0" width="512" height="512" fill="url(#sky)"/>

    <!-- Sun, large and mostly clear -->
    <circle cx="266" cy="246" r="158" fill="url(#sun)"/>

    <!-- Small clouds, just clipping the sun's edges -->
    <g>
      <rect x="96" y="222" width="112" height="58" rx="29" fill="#eaf5ff"/>
      <ellipse cx="190" cy="251" rx="22" ry="26" fill="#fff0c9"/>
    </g>
    <g>
      <circle cx="300" cy="300" r="32" fill="#eaf5ff"/>
      <rect x="270" y="298" width="150" height="66" rx="33" fill="#eaf5ff"/>
      <ellipse cx="298" cy="308" rx="24" ry="22" fill="#fff0c9"/>
    </g>

    <!-- Waves, lower quarter (unchanged) -->
    <path d="M0,398 C70,372 120,372 190,398 C260,424 300,424 370,398 C420,380 470,380 512,398 L512,512 L0,512 Z"
          fill="url(#waveBack)"/>
    <path d="M0,432 C60,408 130,408 190,432 C260,460 300,460 370,432 C430,408 480,408 512,432 L512,512 L0,512 Z"
          fill="url(#waveFront)"/>
  </g>
</svg>
